name: Performance Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL for load testing'
        required: true
        default: 'https://staging.nova-verify.io'
  release:
    types: [created]

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Make scripts executable
      run: chmod +x scripts/*.sh

    - name: Run Performance Tests
      env:
        TARGET_URL: ${{ inputs.target_url || 'https://staging.nova-verify.io' }}
      run: ./scripts/performance-test.sh $TARGET_URL